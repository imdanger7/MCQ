/* ===== NAVIGATION FUNCTIONS ===== */

function showDSUP() {
    subject = "DSUP";
    let html = "<h2>Select DSUP Unit</h2>";
    for (let unit in dsupUnits) {
        html += `<button class="btn unit-btn" onclick="startQuiz('DSUP','${unit}')">${unit}</button>`;
    }
    html += `<br><button class="btn home-btn" onclick="goHome()">🏠 Home</button>`;
    document.getElementById("mainContent").innerHTML = html;
}

function showSE() {
    subject = "SE";
    let html = `
        <h2>Select Section</h2>
        <button class="btn unit-btn" onclick="showSEUnits('DOTE')">DOTE</button>
        <button class="btn unit-btn" onclick="showSEUnits('OWN')">OWN</button>
        <br><button class="btn home-btn" onclick="goHome()">🏠 Home</button>
    `;
    document.getElementById("mainContent").innerHTML = html;
}

function showSEUnits(sec) {
    section = sec;
    let units = sec === "DOTE" ? seDOTE : seOWN;
    let html = `<h2>Select ${sec} Unit</h2>`;
    for (let unit in units) {
        html += `<button class="btn unit-btn" onclick="startQuiz('${sec}','${unit}')">${unit}</button>`;
    }
    html += `<br><button class="btn back-btn" onclick="showSE()">Back</button>`;
    document.getElementById("mainContent").innerHTML = html;
}

/* ================= QUIZ START ================= */

function startQuiz(type, unit) {

    timeLeft = 1500;

    if(type === "DSUP") currentQuestions = dsupUnits[unit];
    else if(type === "DOTE") currentQuestions = seDOTE[unit];
    else currentQuestions = seOWN[unit];

    let html = `
        <h2>${unit}</h2>
        <div class="timer">⏳ Time Left: <span id="time">${formatTime(timeLeft)}</span></div>
        <div class="question-box">
    `;

    currentQuestions.forEach((item, index) => {
        html += `<p><b>${index+1}. ${item.q}</b></p>`;
        item.options.forEach((opt, i) => {
            html += `
                <label>
                    <input type="radio" name="q${index}" value="${i}">
                    ${opt}
                </label><br>
            `;
        });
    });

    html += `
        </div>
        <br>
        <button class="btn submit-btn" onclick="submitQuiz()">Submit</button>
        <br>
        <button class="btn back-btn" onclick="goBack()">Back</button>
        <button class="btn home-btn" onclick="goHome()">🏠 Home</button>
    `;

    document.getElementById("mainContent").innerHTML = html;
    startTimer();
}

/* ================= TIMER ================= */

function startTimer() {
    timerInterval = setInterval(function(){
        timeLeft--;
        document.getElementById("time").innerText = formatTime(timeLeft);
        if(timeLeft <= 0){
            clearInterval(timerInterval);
            submitQuiz();
        }
    },1000);
}

function formatTime(seconds) {
    let m = Math.floor(seconds/60);
    let s = seconds%60;
    return `${m}:${s<10?"0"+s:s}`;
}

/* ================= SUBMIT ================= */

function submitQuiz() {

    clearInterval(timerInterval);
    let score = 0;
    let resultHTML = "<h2>Result</h2><div class='result-box'>";

    currentQuestions.forEach((item,index)=>{
        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        let correctAnswer = item.answer;
        let userAnswer = selected ? parseInt(selected.value) : null;

        resultHTML += `<p><b>${index+1}. ${item.q}</b></p>`;

        item.options.forEach((opt,i)=>{
            if(i === correctAnswer){
                resultHTML += `<p class="correct">✔ ${opt} (Correct)</p>`;
            }
            else if(i === userAnswer){
                resultHTML += `<p class="wrong">✘ ${opt} (Your Answer)</p>`;
            }
        });

        if(userAnswer === correctAnswer) score++;
        resultHTML += "<hr>";
    });

    let percentage = ((score/currentQuestions.length)*100).toFixed(2);

    resultHTML += `<h3>Score: ${score} / ${currentQuestions.length}</h3>`;
    resultHTML += `<h3>Percentage: ${percentage}%</h3>`;
    resultHTML += percentage >= 50 
        ? `<h3 class="correct">PASS 🎉</h3>` 
        : `<h3 class="wrong">FAIL ❌</h3>`;

    resultHTML += "</div>";
    resultHTML += `<button class="btn home-btn" onclick="goHome()">🏠 Home</button>`;

    document.getElementById("mainContent").innerHTML = resultHTML;
}

/* ================= BACK & HOME ================= */

function goHome(){
    clearInterval(timerInterval);
    location.reload();
}

function goBack(){
    clearInterval(timerInterval);
    if(subject === "DSUP") showDSUP();
    else showSEUnits(section);
}

</script>
